# Set <leader>-r to refresh config file
unbind r
bind r source-file ~/.tmux.conf

# Act like vim
setw -g mode-keys vi

# Make tmux's copy mode act like vim
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Use incremental search (via https://www.reddit.com/r/tmux/comments/arv927/comment/egqfuvc/?utm_source=share&utm_medium=web2x&context=3):
bind-key -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" -p "(search up)" "send -X search-backward-incremental \"%%%\""

# Display various help in split window via menu
bind-key h display-menu -t 1 -T "Documentation Source" \
"cht.sh" c "split-window -f -h 'cht.sh --shell'" \
"Man Pages" m "command-prompt -p \"Man page:\" \"split-window -f -h 'man %1'\"" \
"Obsidian" o "run-shell ~/bin/open-obsidian-file-in-split.zsh" \
"tldr" t "command-prompt -p \"TLDR page:\" \"split-window -f -h 'tldr %1 | less'\"" \

# Display launcher menu
unbind-key e
bind-key e run-shell "launch"

# Display ts script.
bind v run-shell "tmux-too-young open"

# Prompt for opening Jira ticket
bind-key j command-prompt -p "Enter Jira ID:" "run-shell '~/bin/open-jira.zsh %%'"

# Kill session
bind-key X confirm-before -p "kill-session #S? (y/n)" kill-session

# Window navigation
bind-key C-b last-window

# Window splitting bindings
## Normal shell
bind-key - split-window
bind-key | split-window -h
## Shell with no profile being loaded (q for quick)
bind-key C new-window -c "#{pane_current_path}" "/bin/zsh -f"

# The following is required for <shift>-enter to work in opencode.
# It has a side-effect though. It means the resize commands don't work.
# This needs fixing.
# NOTE: Disabled as you are not currently using opencode
# set -g extended-keys on
# set -as terminal-features 'xterm*:extkeys'

# Pane resizing
bind -n M-H resize-pane -L 10
bind -n M-L resize-pane -R 10
bind -n M-K resize-pane -U 10
bind -n M-J resize-pane -D 10

# Add binding so you can easily distribute panes evenly
bind = select-layout even-horizontal

# Sort sessions by recently used rather than by session number
bind s choose-tree -Zs -O time

# Enable the mouse
set -g mouse on

# Start index from 1 rather than 0.
# It's annoying having to reach to other side of keyboard for first entry.
set -g base-index 1
set -g pane-base-index 1

# Don't exit tmux when you kill session. Instead switch to another session.
set-option -g detach-on-destroy off

# List of plugins.
# Note: once you've added an entry, press `<leader> + I`
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# Configure theme

set -g @catppuccin_window_status_style "rounded"

# Configure what is displayed for each tab
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W"

# Configure status bar
set -g status-position top

# Configure left status
set -g status-left-length 150
set -g status-left "#{E:@catppuccin_status_session}"

# Configure right status
set -g status-right-length 100
set -g status-right "#{pomodoro_status} #{battery_icon} #{battery_percentage} | %d-%h %H:%M"

# Set thicker pane borders
set -g pane-border-lines heavy

# Options added off the back of a healthcheck in neovim
set-option -g focus-events on
set-option -sg escape-time 10

# Keybind to display Opencode in a floating window
#bind-key a popup -E "tmux new-session -A -s opencode opencode \$kb"

# Pomodoro configuration

set -g @pomodoro_toggle 'p'                    # Start/pause a Pomodoro/break
set -g @pomodoro_cancel 'P'                    # Cancel the current session
set -g @pomodoro_skip '_'                      # Skip a Pomodoro/break
set -g @pomodoro_restart ' '				   # Set to nothing so that it doesn't intefere with the key binding for 'launcher'.

set -g @pomodoro_mins 25                       # The duration of the Pomodoro
set -g @pomodoro_break_mins 5                  # The duration of the break after the Pomodoro completes
set -g @pomodoro_intervals 4                   # The number of intervals before a longer break is started
set -g @pomodoro_long_break_mins 25            # The duration of the long break
set -g @pomodoro_repeat 'off'                  # Automatically repeat the Pomodoros?
set -g @pomodoro_disable_breaks 'off'          # Turn off breaks

set -g @pomodoro_on " 🍅 "                      # The formatted output when the Pomodoro is running
set -g @pomodoro_complete " ✔︎ "                 # The formatted output when the break is running
set -g @pomodoro_pause " ⏸︎ "                    # The formatted output when the Pomodoro/break is paused
set -g @pomodoro_prompt_break " ⏲︎ break?"      # The formatted output when waiting to start a break
set -g @pomodoro_prompt_pomodoro " ⏱︎ start?"   # The formatted output when waiting to start a Pomodoro

set -g @pomodoro_menu_position "R"             # The location of the menu relative to the screen
set -g @pomodoro_sound 'Glass'                   # Sound for desktop notifications (Run `ls /System/Library/Sounds` for a list of sounds to use on Mac)
                                               # (On Linux add `on` to use the `beep` program or add your custom beeping command)

set -g @pomodoro_notifications 'on'           # Enable desktop notifications from your terminal
set -g @pomodoro_granularity 'on'             # Enables MM:SS (ex: 00:10) format instead of the default (ex: 1m)
set -g status-interval 1

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
